name: Docker ci /cd pipeline

on:
    push:
        branches:
        - main

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: checkout repo 
              uses: actions/checkout@v4
            
            - name: setup docekrbox
              uses: docker/setup-buildx-action@v3       
            
            
            - name: docker-login
              uses: docker/login-action@v3
              with:
                username: ${{secrets.DOCKER_USERNAME}}
                password: ${{secrets.DOCKER_PASSWORD}}

            - name: docker_build
              run: |
                 docker build -t ${{ secrets.DOCKER_USERNAME}}/myapp:v1 ./frontend

            - name: docker_push
              run: |
                  docker push  ${{ secrets.DOCKER_USERNAME }}/myapp:v1 